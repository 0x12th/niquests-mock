name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to release"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure branch is up to date
        run: git fetch origin "${GITHUB_REF_NAME}" --tags

      - name: Bump version
        run: uv version --bump "${{ inputs.bump }}" --frozen

      - name: Read version
        id: version
        run: echo "value=$(uv version --short)" >> "${GITHUB_OUTPUT}"

      - name: Ensure new tag does not exist
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists"
            exit 1
          fi

      - name: Commit version bump
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release ${VERSION}"

      - name: Create tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: git tag -a "v${VERSION}" -m "Release v${VERSION}"

      - name: Verify tag matches project version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          PROJECT_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          content = Path("pyproject.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', content, re.MULTILINE)
          if not match:
              raise SystemExit("Version not found in pyproject.toml")
          print(match.group(1))
          PY
          )
          test "$PROJECT_VERSION" = "$VERSION"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check src tests

      - name: Test
        run: uv run pytest -p no:cacheprovider -q

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Push release commit and tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${VERSION}"

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: "v${{ needs.prepare.outputs.version }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.prepare.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
