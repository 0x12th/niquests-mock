name: PyPI Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test from PyPI"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package from PyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip install "niquests-mock==${{ inputs.version }}"

      - name: Smoke test mocked request
        run: |
          python - <<'PY'
          import niquests
          import niquests_mock
          from niquests_mock import MockRouter

          assert niquests_mock.__all__
          with MockRouter() as router:
              route = router.get("https://example.org/smoke").respond(
                  status_code=200,
                  json={"ok": True},
              )
              response = niquests.get("https://example.org/smoke")

          route.assert_called_once()
          assert response.status_code == 200
          assert response.json() == {"ok": True}
          print("Smoke OK")
          PY
